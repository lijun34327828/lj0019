<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>极速跑酷 · Parkour Rush</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <div id="game-container">
      <canvas id="game-canvas" width="800" height="450"></canvas>
      
      <div id="hud" class="hud hidden">
        <div class="hud-top">
          <div class="hud-left">
            <div id="hp-bar" class="hp-bar">
              <span class="hp-label">生命</span>
              <div id="hp-hearts" class="hp-hearts"></div>
            </div>
            <div class="score-block">
              <span class="score-label">得分</span>
              <span id="score-value" class="score-value">0</span>
            </div>
            <div class="dist-block">
              <span class="dist-label">距离</span>
              <span id="dist-value" class="dist-value">0m</span>
            </div>
          </div>
          <div class="hud-right">
            <button id="pause-btn" class="pause-btn" title="暂停">⏸</button>
          </div>
        </div>
        <div id="effects-bar" class="effects-bar"></div>
      </div>

      <div id="menu-screen" class="screen menu-screen">
        <div class="menu-content">
          <h1 class="game-title">极速跑酷</h1>
          <p class="game-subtitle">PARKOUR RUSH</p>
          
          <div class="player-info">
            <div class="info-row">
              <span>玩家昵称</span>
              <input id="nickname-input" type="text" maxlength="12" placeholder="输入昵称" value="玩家" />
            </div>
            <div class="info-row">
              <span>最高分</span>
              <span id="menu-high-score" class="highlight">0</span>
            </div>
            <div class="info-row">
              <span>总场次</span>
              <span id="menu-total-games">0</span>
            </div>
          </div>

          <div class="menu-buttons">
            <button id="start-btn" class="btn btn-primary">开始游戏</button>
            <button id="history-btn" class="btn btn-secondary">历史记录</button>
            <button id="rank-btn" class="btn btn-secondary">排行榜</button>
          </div>

          <div class="controls-hint">
            <div class="hint-row"><span>⬆️ 空格/点击上半屏</span><b>跳跃 (二段跳)</b></div>
            <div class="hint-row"><span>⬇️ S/长按点击下半屏</span><b>滑铲</b></div>
            <div class="hint-row"><span>P / ESC</span><b>暂停</b></div>
          </div>
        </div>
      </div>

      <div id="pause-screen" class="screen pause-screen hidden">
        <div class="pause-content">
          <h2>游戏暂停</h2>
          <div class="pause-stats">
            <div><span>当前得分</span><b id="pause-score">0</b></div>
            <div><span>已跑距离</span><b id="pause-dist">0m</b></div>
          </div>
          <div class="menu-buttons">
            <button id="resume-btn" class="btn btn-primary">继续游戏</button>
            <button id="restart-btn" class="btn btn-secondary">重新开始</button>
            <button id="quit-btn" class="btn btn-danger">返回主菜单</button>
          </div>
        </div>
      </div>

      <div id="gameover-screen" class="screen gameover-screen hidden">
        <div class="gameover-content">
          <h2 id="gameover-title">对局结束</h2>
          <div id="new-record-badge" class="new-record hidden">🏆 新纪录!</div>
          <div class="result-stats">
            <div class="stat-main">
              <span>最终得分</span>
              <b id="final-score">0</b>
            </div>
            <div class="stat-grid">
              <div><span>距离</span><b id="final-dist">0m</b></div>
              <div><span>障碍</span><b id="final-obstacles">0</b></div>
              <div><span>道具</span><b id="final-items">0</b></div>
              <div><span>时长</span><b id="final-duration">0s</b></div>
            </div>
            <div class="stat-highlight">
              <span>历史最高</span>
              <b id="final-highscore">0</b>
            </div>
          </div>
          <div class="menu-buttons">
            <button id="retry-btn" class="btn btn-primary">再来一局</button>
            <button id="menu-btn" class="btn btn-secondary">返回主菜单</button>
          </div>
        </div>
      </div>

      <div id="history-screen" class="screen history-screen hidden">
        <div class="history-content">
          <h2>历史记录</h2>
          <div id="history-list" class="history-list"></div>
          <div class="menu-buttons">
            <button id="history-back-btn" class="btn btn-secondary">返回</button>
          </div>
        </div>
      </div>

      <div id="rank-screen" class="screen rank-screen hidden">
        <div class="rank-content">
          <h2>排行榜</h2>
          <div id="rank-list" class="rank-list"></div>
          <div class="menu-buttons">
            <button id="rank-back-btn" class="btn btn-secondary">返回</button>
          </div>
        </div>
      </div>

      <div id="reconnecting-toast" class="toast hidden">
        <div class="toast-content">
          <div class="spinner"></div>
          <span>断线重连中...</span>
        </div>
      </div>

      <div id="loading-toast" class="toast hidden">
        <div class="toast-content">
          <div class="spinner"></div>
          <span id="loading-text">连接服务器中...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/network.js"></script>
  <script src="/js/renderer.js"></script>
  <script src="/js/input.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
